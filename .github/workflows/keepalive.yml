name: Keep Render Backend Alive

on:
  schedule:
    # Ejecutar cada 14 minutos (Render duerme a los 15 min de inactividad en la capa gratuita)
    - cron: "*/14 * * * *"
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: curl -sSf https://nexora-gsdu.onrender.com/health || exit 1
